<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Connor Workout Tracker</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0b0b0d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tracker" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Sidebar (desktop) -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="#06120c" width="18" height="18"><path d="M13 2 4 14h6l-1 8 9-12h-6z"/></svg>
      </div>
      <span class="logo-text">TRACKER</span>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" data-view="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        Dashboard
      </button>
      <button class="nav-item" data-view="streak">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 4v7l3 3-3 3v3"/><path d="M6 4v7l-3 3 3 3v3"/></svg>
        Run
      </button>
      <button class="nav-item" data-view="lifts">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 7v10M17.5 7v10M3 12h18M3 9v6M21 9v6"/></svg>
        Lifts
      </button>
      <button class="nav-item" data-view="weight">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2 6 4-14 2 8h6"/></svg>
        Weight
      </button>
      <button class="nav-item" data-view="nutrition">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-5.7 7-11a7 7 0 0 0-14 0c0 5.3 7 11 7 11Z"/><circle cx="12" cy="10" r="2.4"/></svg>
        Nutrition
      </button>
    </nav>
    <div class="sidebar-footer">
      <button class="nav-item" data-view="settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.2"/><path d="M12 3v2.5M12 18.5V21M21 12h-2.5M5.5 12H3M18.4 5.6l-1.8 1.8M7.4 16.6l-1.8 1.8M18.4 18.4l-1.8-1.8M7.4 7.4 5.6 5.6"/></svg>
        Settings
      </button>
    </div>
  </aside>

  <!-- Bottom nav (mobile) -->
  <nav class="bottom-nav">
    <div id="bnav-pill"></div>
    <button class="bnav-item active" data-view="dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      <span>Home</span>
    </button>
    <button class="bnav-item" data-view="streak">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 4v7l3 3-3 3v3"/><path d="M6 4v7l-3 3 3 3v3"/></svg>
      <span>Run</span>
    </button>
    <button class="bnav-item" data-view="lifts">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 7v10M17.5 7v10M3 12h18M3 9v6M21 9v6"/></svg>
      <span>Lifts</span>
    </button>
    <button class="bnav-item" data-view="weight">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2 6 4-14 2 8h6"/></svg>
      <span>Weight</span>
    </button>
    <button class="bnav-item" data-view="nutrition">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-5.7 7-11a7 7 0 0 0-14 0c0 5.3 7 11 7 11Z"/><circle cx="12" cy="10" r="2.4"/></svg>
      <span>Food</span>
    </button>
  </nav>

  <!-- Main content -->
  <main class="main">
    <div id="view-dashboard" class="view"></div>
    <div id="view-streak"    class="view hidden"></div>
    <div id="view-lifts"     class="view hidden"></div>
    <div id="view-weight"    class="view hidden"></div>
    <div id="view-nutrition" class="view hidden"></div>
    <div id="view-settings"  class="view hidden"></div>
    <div id="view-marathon"  class="view hidden"></div>
  </main>

  <!-- New Plan Modal -->
  <div id="new-plan-overlay" style="display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.7)" onclick="closeNewPlanModal()"></div>
  <div id="new-plan-modal" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:301;background:#141417;border-radius:20px 20px 0 0;padding:24px 20px 44px;transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.32,0.72,0,1)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div style="font-family:'Space Grotesk';font-size:16px;font-weight:700;color:#dcdce0;letter-spacing:.04em">Generate New Plan</div>
      <button onclick="closeNewPlanModal()" style="background:none;border:none;cursor:pointer;color:#6c6c72;font-size:22px;line-height:1;padding:4px">&times;</button>
    </div>
    <p style="font-size:13px;color:var(--text-2);margin-bottom:20px;line-height:1.6">Choose a plan type for this week. This replaces the current week's plan.</p>
    <div style="display:flex;flex-direction:column;gap:12px">
      <button onclick="generateNewPlan('martial-arts')" class="plan-type-btn">
        <div style="font-size:28px">🥊</div>
        <div>
          <div style="font-weight:700;font-size:15px;color:#dcdce0">Martial Arts Focus</div>
          <div style="font-size:12px;color:var(--text-3);margin-top:2px">Muay Thai, sparring, pad work + gym sessions</div>
        </div>
      </button>
      <button onclick="generateNewPlan('strength')" class="plan-type-btn">
        <div style="font-size:28px">🏋️</div>
        <div>
          <div style="font-weight:700;font-size:15px;color:#dcdce0">Strength Focus</div>
          <div style="font-size:12px;color:var(--text-3);margin-top:2px">Push / pull / legs + cardio days</div>
        </div>
      </button>
      <button onclick="generateNewPlan(null)" class="plan-type-btn">
        <div style="font-size:28px">🤖</div>
        <div>
          <div style="font-weight:700;font-size:15px;color:#dcdce0">Auto (based on history)</div>
          <div style="font-size:12px;color:var(--text-3);margin-top:2px">Adapts to your recent workout patterns</div>
        </div>
      </button>
    </div>
  </div>

  <!-- Edit Exercise Modal -->
  <div id="edit-ex-overlay" style="display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.7)" onclick="closeEditExercise()"></div>
  <div id="edit-ex-modal" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:301;background:#141417;border-radius:20px 20px 0 0;padding:24px 20px 44px;transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);max-height:90vh;overflow-y:auto">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div style="font-family:'Space Grotesk';font-size:16px;font-weight:700;color:#dcdce0">Edit Exercise</div>
      <button onclick="closeEditExercise()" style="background:none;border:none;cursor:pointer;color:#6c6c72;font-size:22px;line-height:1;padding:4px">&times;</button>
    </div>
    <input type="hidden" id="edit-ex-plan" /><input type="hidden" id="edit-ex-orig-name" />
    <div class="edit-field"><label class="edit-label">Exercise Name</label><input id="edit-ex-name" type="text" class="edit-input" placeholder="e.g. Bench Press" /></div>
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <button id="edit-ex-type-weighted" onclick="setExType('edit','weighted')" class="btn" style="flex:1;padding:10px;font-size:13px;font-weight:700;background:#00ff88;color:#06120c;border-radius:10px">Weighted</button>
      <button id="edit-ex-type-tempo" onclick="setExType('edit','tempo')" class="btn" style="flex:1;padding:10px;font-size:13px;font-weight:700;background:#1e1e22;color:#6c6c72;border-radius:10px">Tempo / Timed</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="edit-field"><label class="edit-label">Sets</label><input id="edit-ex-sets" type="number" class="edit-input" min="1" /></div>
      <div class="edit-field" id="edit-ex-reps-field"><label class="edit-label">Reps</label><input id="edit-ex-reps" type="text" class="edit-input" placeholder="e.g. 8-12" /></div>
      <div class="edit-field"><label class="edit-label">Tempo</label><input id="edit-ex-tempo" type="text" class="edit-input" placeholder="e.g. 3010" /></div>
      <div class="edit-field"><label class="edit-label">Rest (secs)</label><input id="edit-ex-rest" type="number" class="edit-input" placeholder="60" /></div>
    </div>
    <div class="edit-field" id="edit-ex-rpe-field"><label class="edit-label">RPE</label><input id="edit-ex-rpe" type="text" class="edit-input" placeholder="e.g. 8→8.5" /></div>
    <div class="edit-field"><label class="edit-label">Notes</label><textarea id="edit-ex-notes" class="edit-input" rows="2" placeholder="Optional notes"></textarea></div>
    <button onclick="saveEditExercise()" class="btn" style="width:100%;margin-top:8px;background:var(--mint);color:#06120c;font-weight:700;font-size:15px;padding:14px">Save Changes</button>
  </div>

  <!-- Add Exercise Modal -->
  <div id="add-ex-overlay" style="display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.7)" onclick="closeAddExercise()"></div>
  <div id="add-ex-modal" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:301;background:#141417;border-radius:20px 20px 0 0;padding:24px 20px 44px;transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);max-height:90vh;overflow-y:auto">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div style="font-family:'Space Grotesk';font-size:16px;font-weight:700;color:#dcdce0">Add Exercise</div>
      <button onclick="closeAddExercise()" style="background:none;border:none;cursor:pointer;color:#6c6c72;font-size:22px;line-height:1;padding:4px">&times;</button>
    </div>
    <input type="hidden" id="add-ex-plan" />
    <div class="edit-field"><label class="edit-label">Exercise Name</label><input id="add-ex-name" type="text" class="edit-input" placeholder="e.g. Incline DB Press" /></div>
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <button id="add-ex-type-weighted" onclick="setExType('add','weighted')" class="btn" style="flex:1;padding:10px;font-size:13px;font-weight:700;background:#00ff88;color:#06120c;border-radius:10px">Weighted</button>
      <button id="add-ex-type-tempo" onclick="setExType('add','tempo')" class="btn" style="flex:1;padding:10px;font-size:13px;font-weight:700;background:#1e1e22;color:#6c6c72;border-radius:10px">Tempo / Timed</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="edit-field"><label class="edit-label">Sets</label><input id="add-ex-sets" type="number" class="edit-input" value="3" min="1" /></div>
      <div class="edit-field" id="add-ex-reps-field"><label class="edit-label">Reps</label><input id="add-ex-reps" type="text" class="edit-input" placeholder="e.g. 8-12" /></div>
      <div class="edit-field"><label class="edit-label">Tempo</label><input id="add-ex-tempo" type="text" class="edit-input" placeholder="e.g. 3010" /></div>
      <div class="edit-field"><label class="edit-label">Rest (secs)</label><input id="add-ex-rest" type="number" class="edit-input" value="60" /></div>
    </div>
    <div class="edit-field" id="add-ex-rpe-field"><label class="edit-label">RPE</label><input id="add-ex-rpe" type="text" class="edit-input" placeholder="e.g. 8→8.5" /></div>
    <div class="edit-field"><label class="edit-label">Notes</label><textarea id="add-ex-notes" class="edit-input" rows="2" placeholder="Optional notes"></textarea></div>
    <button onclick="saveAddExercise()" class="btn" style="width:100%;margin-top:8px;background:var(--mint);color:#06120c;font-weight:700;font-size:15px;padding:14px">Add Exercise</button>
  </div>

  <!-- New Lifts Plan Modal -->
  <div id="new-plan2-overlay" style="display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.7)" onclick="closeNewPlanModal2()"></div>
  <div id="new-plan2-modal" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:301;background:#141417;border-radius:20px 20px 0 0;padding:24px 20px 44px;transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.32,0.72,0,1)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div style="font-family:'Space Grotesk';font-size:16px;font-weight:700;color:#dcdce0">New Workout Plan</div>
      <button onclick="closeNewPlanModal2()" style="background:none;border:none;cursor:pointer;color:#6c6c72;font-size:22px;line-height:1;padding:4px">&times;</button>
    </div>
    <div class="edit-field"><label class="edit-label">Plan Name</label><input id="new-plan-name" type="text" class="edit-input" placeholder="e.g. Plan C — Upper Body" /></div>
    <p style="font-size:12px;color:var(--text-3);margin-bottom:16px">Creates a blank plan. Add exercises to it after.</p>
    <button onclick="saveNewPlan()" class="btn" style="width:100%;background:var(--mint);color:#06120c;font-weight:700;font-size:15px;padding:14px">Create Plan</button>
  </div>

  <!-- Edit Workout Modal -->
  <div id="edit-workout-overlay" style="display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.7)" onclick="closeEditWorkout()"></div>
  <div id="edit-workout-modal" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:301;background:#141417;border-radius:20px 20px 0 0;padding:24px 20px 44px;transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);max-height:85vh;overflow-y:auto">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div style="font-family:'Space Grotesk';font-size:16px;font-weight:700;color:#dcdce0;letter-spacing:.04em">Edit Workout</div>
      <button onclick="closeEditWorkout()" style="background:none;border:none;cursor:pointer;color:#6c6c72;font-size:22px;line-height:1;padding:4px">&times;</button>
    </div>
    <input type="hidden" id="edit-workout-id" />
    <div class="edit-field">
      <label class="edit-label">Activity</label>
      <input id="edit-activity" type="text" class="edit-input" placeholder="e.g. Muay Thai" />
    </div>
    <div class="edit-field">
      <label class="edit-label">Duration (minutes)</label>
      <input id="edit-duration" type="number" class="edit-input" min="1" placeholder="e.g. 60" />
    </div>
    <div class="edit-field">
      <label class="edit-label">Intensity</label>
      <select id="edit-intensity" class="edit-input">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>
    </div>
    <div class="edit-field">
      <label class="edit-label">Date</label>
      <input id="edit-date" type="date" class="edit-input" />
    </div>
    <div class="edit-field">
      <label class="edit-label">Notes</label>
      <textarea id="edit-raw-text" class="edit-input" rows="3" placeholder="Original workout notes"></textarea>
    </div>
    <button onclick="saveEditWorkout()" class="btn" style="width:100%;margin-top:8px;background:var(--mint);color:#06120c;font-weight:700;font-size:15px;padding:14px">Save Changes</button>
  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
